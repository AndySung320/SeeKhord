# Colab example: copy to config.colab.yaml and change to your Drive path
data_root: /content/drive/MyDrive/SeeKhord

paths:
  splits: data/splits.json
  vocabulary: data/chord_vocabulary.json
  songs: songs

train:
  reduced: "25"
  input_dim: 12 # 84 if using scripts/preprocess_audio.py --mode cqt84 --songs-dir songs_cqt84
  segment_frames: 200
  batch_size: 32
  epochs: 30
  lr: 0.001
  weight_decay: 0.0003
  dropout: 0.4
  scheduler: plateau
  scheduler_patience: 4
  scheduler_factor: 0.5
  scheduler_min_lr: 1.0e-6
  num_workers: 0
  device: null

output:
  dir: /content/drive/MyDrive/dl_project/checkpoints
  checkpoint_prefix: chord_crnn
  history_prefix: training_history

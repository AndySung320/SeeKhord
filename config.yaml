# Local default: data_root is the project root (contains data/ and songs/)
# Colab: change to mounted path, e.g. /content/drive/MyDrive/SeeKhord
data_root: .

paths:
  splits: data/splits.json
  vocabulary: data/chord_vocabulary.json
  songs: songs

train:
  # model: crnn        # optional: crnn | crnn_attn | crnn_ms (default crnn; or --model)
  reduced: "25"       # full | 25 | 61
  input_dim: 12        # must match features.npy width (84 for songs_cqt84 / --mode cqt84)
  segment_frames: 200
  segment_hop_frames: 200  # stride between chunks; 100 = 50% overlap when segment_frames=200
  batch_size: 16
  epochs: 30
  lr: 0.001
  weight_decay: 0.0003   # stronger L2 (was 1e-4)
  dropout: 0.4           # ChordCRNN dropout
  scheduler: plateau     # none | plateau — ReduceLROnPlateau on val loss
  scheduler_patience: 4
  scheduler_factor: 0.5
  scheduler_min_lr: 1.0e-6
  num_workers: 0      # Colab usually keep 0
  device: null        # null = auto cuda/cpu
  # Train-only pitch augmentation (reduced_25 or reduced_61): np.roll on features + matching label root rotation
  augment_pitch: true
  augment_prob: 0.5
  pitch_shift_max: 5   # uniform integer in [-max..-1] ∪ [1..max]
  early_stop_patience: 0   # 0 = disabled (default); N>0: stop if val loss does not improve for N epochs
  early_stop_min_delta: 0.0
  # Optional CrossEntropy class weights (JSON from scripts/count_reduced25_train_frames.py or count_reduced61_train_frames.py):
  # class_weight_json: data/reduced25_train_frame_counts.json   # when train.reduced is "25"
  # class_weight_json: data/reduced61_train_frame_counts.json    # when train.reduced is "61"
  # class_weight_scheme: inv_sqrt   # inv_sqrt | inv_freq (required if JSON has counts); omit weights with scheme none
  # class_weight_eps: 1.0           # for inv_freq: w ∝ 1/(count+eps)
  # class_weight_clip_max: null    # e.g. 5.0 to cap weights after mean normalization

# Saves {checkpoint_prefix}_{model_type}_{YYYYMMDD_HHMMSS}.pt and {history_prefix}_{model_type}_{YYYYMMDD_HHMMSS}.json
output:
  dir: checkpoints
  checkpoint_prefix: chord_crnn
  history_prefix: training_history
